# SonarQube Cloud (GitHub-bound project)
# https://sonarcloud.io/project/configuration?id=devcamos_apisandbox
#
# Connect the repo in SonarCloud, then: Project → Administration → Analysis Method
# → With GitHub Actions. Use the generated token as GitHub secret SONAR_TOKEN.
# If Automatic Analysis is enabled for this repo, turn it off to avoid duplicate runs.
#
# Fail the GitHub Actions scan step when the SonarCloud Quality Gate fails (see CI workflow).
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=600

# Tune ratings / duplication thresholds in SonarCloud (Project Settings → Quality Gate).
# Quality Gate: SonarCloud project settings; optional local check: npm run sonar:status

sonar.projectKey=devcamos_apisandbox
sonar.organization=devcamos

sonar.sources=app/api,config,lib,middleware.ts
sonar.tests=tests
sonar.test.inclusions=tests/**/*.spec.ts,tests/**/*.test.ts,tests/**/*.test.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Do not require test coverage on App Router UI, demos, curriculum data, or infra helpers.
# Coverage is enforced on the small surface exported in Vitest `coverage.include` (see vitest.config.ts).
sonar.coverage.exclusions=**/app/**,\
**/components/**,\
**/hooks/**,\
**/middleware.ts,\
**/config/environmentManager.ts,\
**/lib/learning/**,\
**/lib/lessons/**,\
**/lib/phase-6/**,\
**/lib/services/**,\
**/lib/auth/**,\
**/lib/http/**,\
**/lib/auth-config.ts,\
**/lib/auth.ts,\
**/lib/email.ts,\
**/lib/logger.ts,\
**/lib/metrics.ts,\
**/lib/prisma.ts,\
**/lib/rate-limit.ts,\
**/lib/seo.ts,\
**/lib/stripe.ts,\
**/lib/subscription.ts

# Copy-paste detection: exclude repetitive curriculum/UI, tests, scripts, and phase-6 content modules (high structural similarity, low merge risk).
# Keep the glob list on separate lines to avoid subtle parsing issues in CI.
sonar.cpd.exclusions=lib/learning/**,\
lib/lessons/**,\
lib/phase-6/**,\
components/**,\
hooks/**,\
app/**/*.tsx,\
app/api/**,\
app/story/**,\
app/cloud/**,\
app/docs/**,\
lib/services/**,\
lib/auth/**,\
tests/**,\
scripts/**,\
**/*.spec.ts,\
**/*.spec.tsx

sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/test-results/**,**/playwright-report/**,**/playwright/.cache/**,mobile/**,**/prisma/migrations/**,**/public/**,**/*.config.ts,**/*.config.mjs,**/lib/learning/**,**/lib/lessons/**,**/lib/phase-6/**,**/components/**,**/hooks/**,**/app/**/page.tsx,**/app/**/layout.tsx,**/app/**/error.tsx,**/app/**/not-found.tsx
