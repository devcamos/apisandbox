# SonarQube Cloud (GitHub-bound project)
# https://sonarcloud.io/project/configuration?id=devcamos_apisandbox
#
# Connect the repo in SonarCloud, then: Project → Administration → Analysis Method
# → With GitHub Actions. Use the generated token as GitHub secret SONAR_TOKEN.
# If Automatic Analysis is enabled for this repo, turn it off to avoid duplicate runs.
#
# Quality Gate is enforced in SonarCloud UI / branch protection. Waiting here fails CI until
# all Sonar issues are resolved; re-enable when the project is green:
# sonar.qualitygate.wait=true
# sonar.qualitygate.timeout=600

sonar.projectKey=devcamos_apisandbox
sonar.organization=devcamos

sonar.sources=app,components,config,hooks,lib,middleware.ts
sonar.tests=tests
sonar.test.inclusions=tests/**/*.spec.ts,tests/**/*.test.ts,tests/**/*.test.tsx

sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.exclusions=**/node_modules/**,**/.next/**,**/coverage/**,**/test-results/**,**/playwright-report/**,**/playwright/.cache/**,mobile/**,**/prisma/migrations/**,**/public/**,**/*.config.ts,**/*.config.mjs
