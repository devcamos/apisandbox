name: PR Architecture Intelligence

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-architecture-intelligence-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: --max-old-space-size=6144
  NEXT_TELEMETRY_DISABLED: "1"
  AUTH_SECRET: github-actions-ci-placeholder-secret-min-32-chars
  NEXTAUTH_SECRET: github-actions-ci-placeholder-secret-min-32-chars
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/_build_placeholder
  NEXT_PUBLIC_APP_URL: http://localhost:4000
  RESEND_API_KEY: github-actions-ci-resend-placeholder

jobs:
  review:
    name: Review architecture changes
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect changed files and diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p .pr-architecture
          git diff --name-status "$BASE_SHA" "$HEAD_SHA" > .pr-architecture/changed-files.txt
          git diff --no-color --no-ext-diff --unified=40 "$BASE_SHA" "$HEAD_SHA" > .pr-architecture/diff.patch

      - name: Run repository diagnostics
        shell: bash
        run: |
          set +e

          run_check() {
            local name="$1"
            shift
            "$@" > ".pr-architecture/${name}.txt" 2>&1
            printf '%s\n' "$?" > ".pr-architecture/${name}.exit"
          }

          run_check npm-audit npm audit --json
          run_check npm-ls npm ls --all

          if npm pkg get scripts.test:unit | grep -qv '^{}$'; then
            run_check tests npm run test:unit
          elif npm pkg get scripts.test | grep -qv '^{}$'; then
            run_check tests npm test
          else
            printf 'No test script is defined; skipped.\n' > .pr-architecture/tests.txt
            printf '0\n' > .pr-architecture/tests.exit
          fi

          if npm pkg get scripts.build | grep -qv '^{}$'; then
            run_check build npm run build
          else
            printf 'No build script is defined; skipped.\n' > .pr-architecture/build.txt
            printf '0\n' > .pr-architecture/build.exit
          fi

          if [[ -x node_modules/.bin/depcruise ]]; then
            run_check dependency-cruiser node_modules/.bin/depcruise app components config lib --output-type err
          else
            printf 'dependency-cruiser is not installed; skipped.\n' > .pr-architecture/dependency-cruiser.txt
            printf '0\n' > .pr-architecture/dependency-cruiser.exit
          fi

          exit 0

      - name: Generate architecture review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_REVIEW_MODEL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: node scripts/ai-pr-review.mjs

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-architecture-review-${{ github.event.pull_request.number }}
          path: |
            pr-review.md
            .pr-architecture/
          if-no-files-found: warn
          retention-days: 14

      - name: Post sticky pull request comment
        if: always() && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        env:
          REVIEW_FILE: pr-review.md
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const marker = "<!-- pr-architecture-intelligence -->";
            const fallback = "## PR Architecture Intelligence\n\nThe review file was not generated. Inspect the workflow logs for details.";
            const review = fs.existsSync(process.env.REVIEW_FILE)
              ? fs.readFileSync(process.env.REVIEW_FILE, "utf8")
              : fallback;
            const body = `${marker}\n${review}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(
              (comment) => comment.user?.type === "Bot" && comment.body?.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
