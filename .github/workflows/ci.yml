# Continuous integration: lint, production build, unit tests, SonarCloud, Playwright smoke.
# Continuous delivery: Vercel Git integration builds Preview on each PR and Production on merge to main.
# Manual gate: job `preview-deploy-gate` uses GitHub Environment `preview` (required reviewers) so
# merges to `main` wait for human sign-off after reviewing the Vercel Preview URL (see docs/CI_CD_GITHUB_VERCEL.md).

name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
      - dev
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: --max-old-space-size=6144
  NEXT_TELEMETRY_DISABLED: "1"
  # Build-time placeholders (no database connection required for `next build`).
  AUTH_SECRET: github-actions-ci-placeholder-secret-min-32-chars
  NEXTAUTH_SECRET: github-actions-ci-placeholder-secret-min-32-chars
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/_build_placeholder
  NEXT_PUBLIC_APP_URL: http://localhost:4000
  # `next build` runs with NODE_ENV=production; lib/email.ts validates this at import time.
  RESEND_API_KEY: github-actions-ci-resend-placeholder

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('next.config.mjs', 'app/**', 'components/**', 'lib/**', 'prisma/schema.prisma') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload Next.js build for smoke tests
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          retention-days: 1
          if-no-files-found: error

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests with coverage
        run: |
          mkdir -p reports
          npx vitest run --coverage --reporter=default --reporter=json --reporter=junit --outputFile.json=reports/vitest-results.json --outputFile.junit=reports/vitest-junit.xml

      - name: Publish unit test summary
        if: always()
        run: |
          node <<'EOF'
          const fs = require("fs")
          const path = "reports/vitest-results.json"
          const summaryFile = process.env.GITHUB_STEP_SUMMARY

          if (!fs.existsSync(path)) {
            fs.appendFileSync(summaryFile, "## Unit tests\n\nNo unit test report was generated.\n")
            process.exit(0)
          }

          const report = JSON.parse(fs.readFileSync(path, "utf8"))
          const lines = [
            "## Unit tests",
            "",
            `- Passed: ${report.numPassedTests}`,
            `- Failed: ${report.numFailedTests}`,
            `- Pending: ${report.numPendingTests}`,
            `- Total: ${report.numTotalTests}`,
            `- Suites passed: ${report.numPassedTestSuites}/${report.numTotalTestSuites}`,
          ]
          fs.appendFileSync(summaryFile, `${lines.join("\n")}\n`)
          EOF

      - name: Publish unit test check
        if: ${{ !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        uses: dorny/test-reporter@v3
        with:
          name: Unit Tests
          path: reports/vitest-junit.xml
          reporter: java-junit

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: |
            reports/vitest-results.json
            reports/vitest-junit.xml
          if-no-files-found: warn

  sonarcloud:
    name: SonarQube Cloud
    runs-on: ubuntu-latest
    needs: [lint-and-build, unit-tests]
    # Blocks merge when SONAR_TOKEN is set and SonarCloud Quality Gate fails (sonar.qualitygate.wait=true).
    if: github.event.repository.fork == false
    permissions:
      contents: read
      pull-requests: write
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage

      - name: Cache SonarQube scanner artifacts
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('**/sonar-project.properties', '**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-sonar-

      - name: Validate SonarCloud token access
        if: env.SONAR_TOKEN != ''
        run: |
          set -euo pipefail
          # Skip analysis (without failing CI) if the token can't access the project.
          # This avoids noisy red PRs when a contributor doesn't have SonarCloud permissions.
          resp="$(curl -sS -u "${SONAR_TOKEN}:" "https://sonarcloud.io/api/components/show?component=devcamos_apisandbox" || true)"
          if echo "$resp" | grep -q '"errors"'; then
            echo "SONAR_TOKEN_VALID=false" >> "$GITHUB_ENV"
            echo "SonarCloud token cannot access project; skipping scan."
          else
            echo "SONAR_TOKEN_VALID=true" >> "$GITHUB_ENV"
          fi

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != '' && env.SONAR_TOKEN_VALID == 'true'
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432
        with:
          # Hosted runners occasionally fail GPG keyserver fetch for scanner signature verify.
          skipSignatureVerification: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-compose-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate staging compose (secrets + interpolation)
        env:
          AUTH_SECRET: github-actions-ci-placeholder-secret-min-32-chars
        run: bash scripts/validate-compose.sh

  e2e-smoke:
    needs: [lint-and-build]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: apisandbox_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d apisandbox_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      AUTH_SECRET: github-actions-ci-placeholder-secret-min-32-chars
      NEXTAUTH_SECRET: github-actions-ci-placeholder-secret-min-32-chars
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/apisandbox_ci
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:4000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download Next.js build
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: .next

      # Migrations in prisma/migrations are SQLite-era; fresh Postgres in CI is
      # synced from schema with db push. Use `prisma migrate deploy` in hosted
      # environments only after a Postgres-native migration baseline exists.
      - name: Sync Prisma schema to Postgres (CI)
        run: npx prisma db push --accept-data-loss

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium (with system deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps (browser cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Prepare standalone server for smoke
        run: bash scripts/prepare-smoke-standalone.sh

      - name: Run E2E smoke (Chromium)
        env:
          CI_E2E_USE_PROD_SERVER: "1"
          PLAYWRIGHT_WORKERS: "3"
        run: |
          mkdir -p reports
          PLAYWRIGHT_JSON_OUTPUT_NAME=reports/playwright-smoke.json PLAYWRIGHT_JUNIT_OUTPUT_NAME=reports/playwright-smoke-junit.xml npx playwright test tests/ci-smoke.spec.ts --project=chromium --reporter=json,junit

      - name: Publish smoke test summary
        if: always()
        run: |
          node <<'EOF'
          const fs = require("fs")
          const path = "reports/playwright-smoke.json"
          const summaryFile = process.env.GITHUB_STEP_SUMMARY

          if (!fs.existsSync(path)) {
            fs.appendFileSync(summaryFile, "## E2E smoke tests\n\nNo Playwright smoke report was generated.\n")
            process.exit(0)
          }

          const report = JSON.parse(fs.readFileSync(path, "utf8"))
          const stats = report.stats || {}
          const passed = stats.expected ?? 0
          const failed = stats.unexpected ?? 0
          const flaky = stats.flaky ?? 0
          const skipped = stats.skipped ?? 0
          const total = passed + failed + flaky + skipped

          const lines = [
            "## E2E smoke tests",
            "",
            `- Passed: ${passed}`,
            `- Failed: ${failed}`,
            `- Flaky: ${flaky}`,
            `- Skipped: ${skipped}`,
            `- Total: ${total}`,
            `- Duration: ${Math.round((stats.duration ?? 0) / 1000)}s`,
          ]
          fs.appendFileSync(summaryFile, `${lines.join("\n")}\n`)
          EOF

      - name: Publish smoke test check
        if: ${{ !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
        uses: dorny/test-reporter@v3
        with:
          name: E2E Smoke Tests
          path: reports/playwright-smoke-junit.xml
          reporter: java-junit

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report-json
          path: |
            reports/playwright-smoke.json
            reports/playwright-smoke-junit.xml
          if-no-files-found: warn

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  # Runs only for PRs targeting main, after CI is green. Configure repo → Settings → Environments →
  # "preview" with "Required reviewers" so deploys are not merged until someone approves this step
  # (after checking the Vercel Preview deployment on the PR).
  preview-deploy-gate:
    name: Preview approved (Vercel)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main' && github.event.pull_request.draft == false
    needs: [lint-and-build, unit-tests, e2e-smoke, docker-compose-validate]
    environment: preview
    steps:
      - name: Confirm preview reviewed
        run: |
          echo "Preview environment approved for PR #${{ github.event.pull_request.number }}"
          echo "Merge to main only after verifying the Vercel Preview URL from the Vercel bot comment on this PR."

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Report vulnerabilities/licenses without blocking merges (npm audit still tracked locally).
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          warn-only: true
          fail-on-severity: critical
